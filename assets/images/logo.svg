<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="AstralForge">
  <defs>
    <linearGradient id="star" x1="16" y1="10" x2="48" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9af5ff"/>
      <stop offset="50%" stop-color="#5ee7ff"/>
      <stop offset="100%" stop-color="#7c8cff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Tile -->
  <rect width="64" height="64" rx="16" fill="#050814"/>
  <!-- Futuristic geometric star monogram -->
  <g filter="url(#glow)" fill="none" stroke="url(#star)" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
    <!-- Outer 4-point crystal star -->
    <path d="
      M32 10
      L38 24
      L54 24
      L42 34
      L46 50
      L32 40
      L18 50
      L22 34
      L10 24
      L26 24
      Z
    "/>
    <!-- Inner diamond / forge core -->
    <path d="M32 18 L40 32 L32 46 L24 32 Z"/>
    <!-- Vertical axis -->
    <path d="M32 18 V46"/>
  </g>
</svg>
